<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Zebrafish Research Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: #f4f7f6; }
        header { 
            background: var(--primary); color: white; padding: 15px; 
            text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #map { height: calc(100vh - 80px); width: 100%; }

        /* Scrollable Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 350px !important; }
        
        .popup-header {
            background: var(--accent); color: white; padding: 10px;
            font-weight: bold; text-align: center; font-size: 1.1rem;
        }
        
        .scroll-container {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .group-entry {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .group-entry:last-child { border-bottom: none; }
        
        .lab-name { color: var(--accent); font-weight: bold; font-size: 1rem; display: block; margin-bottom: 3px; }
        .inst-name { font-size: 0.85rem; color: #666; font-style: italic; display: block; margin-bottom: 8px; }
        .pi-info { font-size: 0.9rem; margin-bottom: 5px; }
        .pi-info b { color: #333; }
        
        .details-btn {
            background: #f1f1f1; border: 1px solid #ddd; padding: 4px 8px;
            font-size: 0.75rem; border-radius: 4px; cursor: pointer; margin-top: 5px;
        }
        .details-content {
            display: none; font-size: 0.85rem; color: #555; background: #fafafa;
            padding: 8px; margin-top: 5px; border-radius: 4px; border-left: 3px solid var(--accent);
        }

        .links-row { margin-top: 8px; }
        .links-row a { 
            font-size: 0.8rem; background: var(--accent); color: white; 
            padding: 3px 8px; text-decoration: none; border-radius: 3px; margin-right: 5px;
        }

        /* Custom Zebrafish Icon Style */
        .zebra-icon svg { filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

<header>
    <h1>Spanish Zebrafish Research Network</h1>
</header>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Map centered in Spain
    const map = L.map('map').setView([40.2, -3.7], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 2. Data from your file
    const labs = [
        { city: "Murcia", lat: 37.9922, lng: -1.1307, group: "Inmunidad, Inflamación y Cáncer", inst: "Universidad de Murcia", pi: "Victoriano Mulero", email: "vmulero@um.es", web: "https://www.um.es/nisoft/victor1.htm", desc: "Focus on rare diseases, inflammatory and infectious diseases.", pubs: "Cell Death Discov 2024, EMBO Mol Med 2023." },
        { city: "Barcelona", lat: 41.3851, lng: 2.1734, group: "Neurobiology of Sensory Systems", inst: "UPF", pi: "Berta Alsina", email: "berta.alsina@upf.edu", web: "https://www.upf.edu/web/alsina_lab", desc: "Inner ear development and neuron behavior.", pubs: "Development 2024, Dev Dyn 2023." },
        { city: "Barcelona", lat: 41.3851, lng: 2.1734, group: "Neurodevelopmental Dynamics", inst: "UPF", pi: "Cristina Pujades", email: "cristina.pujades@upf.edu", web: "https://pujadeslab.upf.edu/", desc: "Neuronal circuit assembly in the hindbrain.", pubs: "Development 2024, Cell Reports 2022." },
        { city: "Sevilla", lat: 37.3326, lng: -5.9392, group: "Genetic control of Morphogenesis", inst: "CABD (CSIC/UPO)", pi: "Juan R. Martinez-Morales", email: "jrmarmor@upo.es", web: "http://www.cabd.es", desc: "Early eye development and mechanical forces.", pubs: "Elife 2023, Nat Commun 2023." },
        { city: "Lugo", lat: 43.0125, lng: -7.5558, group: "Barreiro-Iglesias Lab", inst: "ARCUS-USC", pi: "Antón Barreiro", email: "anton.barreiro@usc.es", web: "https://arcus.usc.gal/es", desc: "Spontaneous neuronal regeneration after spinal cord injury.", pubs: "BBA Bioenerg 2024." },
        { city: "Sevilla", lat: 37.3326, lng: -5.9392, group: "Epigenomics of development", inst: "IBiS / Univ. Sevilla", pi: "José María Santos Pereira", email: "jsantos2@us.es", web: "https://departamento.us.es/dbiocel/", desc: "Chromosome conformation and human genetic diseases.", pubs: "PMID: 38321954." },
        { city: "Castellón", lat: 40.05, lng: 0.0, group: "FISH NEUROBEHAVIOUR LAB", inst: "IATS-CSIC", pi: "José Miguel Cerdá", email: "jm.cerda-reverter@csic.es", web: "#", desc: "Neural mechanisms of fish behaviour.", pubs: "J Neurosci 2024." },
        { city: "A Coruña", lat: 43.3623, lng: -8.4115, group: "Neurover", inst: "UDC", pi: "Mónica Folgueira", email: "m.folgueira@udc.es", web: "https://cica.udc.gal/group/neurover/", desc: "CNS organization and development.", pubs: "IJMS 2024." },
        { city: "Madrid", lat: 40.4168, lng: -3.7038, group: "Morfogénesis y neurodegeneración", inst: "CBM (CSIC-UAM)", pi: "Paola Bovolenta", email: "pbovolenta@cbm.csic.es", web: "#", desc: "Brain assembly and sight disabilities.", pubs: "eLife 2021." },
        { city: "Alicante", lat: 38.3452, lng: -0.4810, group: "Cell Plasticity", inst: "Inst. Neurociencias (CSIC-UMH)", pi: "Angela Nieto", email: "anieto@umh.es", web: "https://in.umh-csic.es/", desc: "Cancer cell movements and organ development.", pubs: "Nature 2020." },
        { city: "Vigo", lat: 42.2406, lng: -8.7207, group: "Immunology and Genomics", inst: "IIM-CSIC", pi: "Antonio Figueras", email: "antoniofigueras@iim.csic.es", web: "https://iim.csic.es", desc: "Host-pathogen interaction and inflammation.", pubs: "Dev Comp Immunol 2025." },
        { city: "Sevilla", lat: 37.3326, lng: -5.9392, group: "Moreno-Mateos Lab", inst: "CABD", pi: "Miguel A Moreno-Mateos", email: "mamormat@upo.es", web: "https://www.cabd.es/", desc: "CRISPR-Cas optimizations.", pubs: "Nature Comm 2025." },
        { city: "Barcelona", lat: 41.3851, lng: 2.1734, group: "Repro-Immune Team", inst: "ICM-CSIC", pi: "Laia Ribas", email: "lribas@icm.csic.es", web: "https://ribasreproimmuneteam.wordpress.com/", desc: "Reproductive and immune systems.", pubs: "Genomics 2024." },
        { city: "Barcelona", lat: 41.3851, lng: 2.1734, group: "Trivedi Lab", inst: "EMBL Barcelona", pi: "Vikas Trivedi", email: "trivedi@embl.es", web: "https://www.embl.org", desc: "Multicellular self-organization.", pubs: "Ongoing studies." }
    ];

    // 3. Group data by city
    const grouped = labs.reduce((acc, lab) => {
        if (!acc[lab.city]) acc[lab.city] = { coords: [lab.lat, lab.lng], labs: [] };
        acc[lab.city].labs.push(lab);
        return acc;
    }, {});

    // 4. Create Zebrafish SVG Icon
    const zebrafishSVG = `
    <svg width="40" height="20" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
        <path d="M10,25 Q30,5 60,15 Q80,10 90,5 L85,25 L90,45 Q80,40 60,35 Q30,45 10,25" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
        <circle cx="25" cy="20" r="3" fill="white"/>
        <path d="M30,17 L60,22 M32,25 L62,30 M35,33 L65,38" stroke="white" stroke-width="2" opacity="0.6"/>
    </svg>`;

    const zebraIcon = L.divIcon({
        className: 'zebra-icon',
        html: zebrafishSVG,
        iconSize: [40, 20],
        iconAnchor: [20, 10]
    });

    // 5. Toggle Function
    window.toggleMore = (id) => {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    // 6. Add markers to map
    for (const city in grouped) {
        const data = grouped[city];
        
        let popupHtml = `<div class="popup-header">${city}</div><div class="scroll-container">`;
        
        data.labs.forEach((l, i) => {
            const uniqueId = `details-${city.replace(/\s/g, '')}-${i}`;
            popupHtml += `
                <div class="group-entry">
                    <span class="lab-name">${l.group}</span>
                    <span class="inst-name">${l.inst}</span>
                    <div class="pi-info"><b>Contact:</b> ${l.pi}</div>
                    <div class="links-row">
                        <a href="mailto:${l.email}">Email</a>
                        ${l.web !== '#' ? `<a href="${l.web}" target="_blank">Website</a>` : ''}
                    </div>
                    <button class="details-btn" onclick="toggleMore('${uniqueId}')">View Interests & Pubs</button>
                    <div id="${uniqueId}" class="details-content">
                        <b>Interests:</b> ${l.desc}<br><br>
                        <b>Recent Pubs:</b> ${l.pubs}
                    </div>
                </div>
            `;
        });
        popupHtml += `</div>`;

        L.marker(data.coords, { icon: zebraIcon })
            .addTo(map)
            .bindPopup(popupHtml);
    }
</script>

</body>
</html>
